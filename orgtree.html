<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Struktur Organisasi Pegawai</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #eeece7;
      --border: rgba(0,0,0,0.09);
      --border-md: rgba(0,0,0,0.15);
      --text: #1a1917;
      --text-sec: #6b6a66;
      --text-hint: #9e9c98;
      --blue: #185FA5;
      --blue-bg: #E6F1FB;
      --blue-text: #0C447C;
      --teal-bg: #E1F5EE;
      --teal-text: #085041;
      --amber-bg: #FAEEDA;
      --amber-text: #633806;
      --gray-bg: #F1EFE8;
      --gray-text: #444441;
      --coral-bg: #FAECE7;
      --coral-text: #712B13;
      --radius: 10px;
      --radius-sm: 6px;
      --line: #d0cdc7;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    .page { max-width: 100%; padding: 2rem 2rem 4rem; }

    /* Header */
    .page-header { margin-bottom: 2rem; }
    .page-title { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
    .page-sub { font-size: 13px; color: var(--text-sec); margin-top: 3px; }

    /* Controls */
    .controls {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 2rem; flex-wrap: wrap;
    }
    .controls label { font-size: 13px; color: var(--text-sec); }
    .controls select {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      color: var(--text);
      background: var(--surface);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      outline: none;
      cursor: pointer;
      min-width: 220px;
    }
    .controls select:focus { border-color: var(--blue); }
    .count-badge {
      font-size: 12px; color: var(--text-sec);
      background: var(--surface2);
      border-radius: 99px;
      padding: 4px 12px;
    }

    /* Tree container */
    .tree-scroll {
      overflow-x: auto;
      overflow-y: visible;
      padding-bottom: 1rem;
    }
    .tree-root {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 0;
      min-width: max-content;
      padding: 1rem 0;
    }

    /* Level containers */
    .level-col {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
    }

    /* Node */
    .node-wrap {
      display: flex;
      flex-direction: row;
      align-items: center;
      margin: 6px 0;
      position: relative;
    }

    .node {
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      position: relative;
      border: 0.5px solid var(--border-md);
      min-width: 120px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .node-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-sec);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Level colors */
    .node-kantor   { background: var(--blue-bg);  color: var(--blue-text);  border-color: #B5D4F4; }
    .node-jabatan  { background: var(--teal-bg);  color: var(--teal-text);  border-color: #9FE1CB; }
    .node-pegawai  { background: var(--surface);  color: var(--text);       border-color: var(--border-md); }
    .node-atasan   { background: var(--gray-bg);  color: var(--gray-text);  border-color: #D3D1C7; font-weight: 400; font-size: 12px; }

    /* Connector lines */
    .connector {
      display: flex;
      flex-direction: row;
      align-items: center;
    }
    .line-h {
      width: 28px;
      height: 1.5px;
      background: var(--line);
      flex-shrink: 0;
    }
    .line-v-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
    }
    .branch-group {
      display: flex;
      flex-direction: column;
    }
    .branch-item {
      display: flex;
      flex-direction: row;
      align-items: center;
    }
    .elbow {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 28px;
      flex-shrink: 0;
      position: relative;
    }
    .elbow-line-v {
      width: 1.5px;
      background: var(--line);
      position: absolute;
      left: 0;
    }
    .elbow-line-h {
      height: 1.5px;
      background: var(--line);
      width: 28px;
      position: absolute;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-hint);
      font-size: 14px;
    }
    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-hint);
      font-size: 14px;
    }

    /* Legend */
    .legend {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-sec);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <div class="page-title">Struktur Organisasi Pegawai</div>
    <div class="page-sub" id="subtitle">Memuat data...</div>
  </div>

  <div class="controls">
    <label>Pilih Unit Layanan:</label>
    <select id="f-unit"><option value="">— Memuat... —</option></select>
    <span class="count-badge" id="count-badge"></span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#B5D4F4"></div> Kantor Induk/UP</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9FE1CB"></div> Jabatan</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e0ddd8"></div> Pegawai</div>
    <div class="legend-item"><div class="legend-dot" style="background:#D3D1C7"></div> Nama Atasan</div>
  </div>

  <div id="tree-container" class="loading">Memuat data dari Google Sheets...</div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdx_0oA1EIY2PpzNcf1EYbjJ6XhNRGbHff86rr1DFZsJhP_xUrE3XaATeCMHhkvR4lPngfpdiw04cV/pub?output=csv";

let allData = [];

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g, '').trim());
    return obj;
  });
}

function findCol(row, ...kws) {
  const keys = Object.keys(row);
  for (const kw of kws) {
    const found = keys.find(k => k.toLowerCase().includes(kw.toLowerCase()));
    if (found) return row[found] || '';
  }
  return '';
}

function mapRow(r) {
  return {
    jabatan: findCol(r, 'position', 'jabatan', 'job'),
    nama:    findCol(r, 'full name', 'nama', 'name'),
    nip:     findCol(r, 'prev.per', 'nip', 'pers'),
    peg:     findCol(r, 'peg'),
    unit:    findCol(r, 'unit layanan', 'unit'),
    lokasi:  findCol(r, 'kantor induk', 'kantor', 'lokasi', 'up'),
    atasan:  findCol(r, 'nama atasan', 'atasan', 'supervisor', 'manager'),
  };
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function truncate(str, max) {
  if (!str) return '—';
  return str.length > max ? str.slice(0, max) + '…' : str;
}

function buildTree(unit) {
  const rows = allData.filter(d => d.unit === unit);
  if (!rows.length) return '<div class="empty">Tidak ada data untuk unit ini</div>';

  // Group by lokasi → jabatan → pegawai
  const lokasiMap = {};
  rows.forEach(d => {
    const lok = d.lokasi || '(Lokasi tidak diketahui)';
    const jab = d.jabatan || '(Jabatan tidak diketahui)';
    if (!lokasiMap[lok]) lokasiMap[lok] = {};
    if (!lokasiMap[lok][jab]) lokasiMap[lok][jab] = [];
    lokasiMap[lok][jab].push(d);
  });

  const lokasiList = Object.keys(lokasiMap).sort();
  let html = '<div class="tree-scroll"><div class="tree-root">';

  // Unit node (root)
  html += `
    <div class="node-wrap">
      <div class="node" style="background:#1D9E75;color:#fff;border-color:#0F6E56;min-width:140px;font-size:13px" title="${esc(unit)}">
        ${esc(truncate(unit, 22))}
        <div class="node-sub" style="color:rgba(255,255,255,0.75)">${lokasiList.length} kantor · ${rows.length} pegawai</div>
      </div>
    </div>
  `;

  // Branch from unit to lokasi
  html += buildBranch(lokasiList, (lok, isLast) => {
    const jabList = Object.keys(lokasiMap[lok]).sort();
    const pegCount = jabList.reduce((s, j) => s + lokasiMap[lok][j].length, 0);

    let inner = `
      <div class="node node-kantor" title="${esc(lok)}">
        ${esc(truncate(lok, 20))}
        <div class="node-sub">${jabList.length} jabatan · ${pegCount} pegawai</div>
      </div>
    `;

    // Branch from lokasi to jabatan
    inner += buildBranch(jabList, (jab, isLastJ) => {
      const pegList = lokasiMap[lok][jab];

      let innerJ = `
        <div class="node node-jabatan" title="${esc(jab)}">
          ${esc(truncate(jab, 22))}
          <div class="node-sub">${pegList.length} pegawai</div>
        </div>
      `;

      // Branch from jabatan to pegawai
      innerJ += buildBranch(pegList, (peg, isLastP) => {
        let innerP = `
          <div class="node node-pegawai" title="${esc(peg.nama)}">
            ${esc(truncate(peg.nama, 22))}
            ${peg.nip ? `<div class="node-sub">${esc(peg.nip)}</div>` : ''}
          </div>
        `;

        // Atasan node
        if (peg.atasan) {
          innerP += buildBranch([peg.atasan], (at) => `
            <div class="node node-atasan" title="Atasan: ${esc(at)}">${esc(truncate(at, 22))}</div>
          `);
        }

        return innerP;
      });

      return innerJ;
    });

    return inner;
  });

  html += '</div></div>';
  return html;
}

function buildBranch(items, renderFn) {
  if (!items || !items.length) return '';
  if (items.length === 1) {
    return `
      <div class="branch-item">
        <div class="line-h"></div>
        <div>${renderFn(items[0], true)}</div>
      </div>
    `;
  }

  // Multiple items: draw vertical line with elbows
  let html = `<div style="display:flex;flex-direction:row;align-items:stretch">`;
  html += `<div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0">`;

  // vertical line
  html += `<div style="flex:1;width:1.5px;background:var(--line);margin-left:0"></div>`;
  html += `</div>`;

  html += `<div style="display:flex;flex-direction:column">`;
  items.forEach((item, idx) => {
    const isFirst = idx === 0;
    const isLast = idx === items.length - 1;
    html += `
      <div style="display:flex;flex-direction:row;align-items:center;position:relative">
        <div style="width:28px;flex-shrink:0;position:relative;display:flex;align-items:center">
          <div style="width:28px;height:1.5px;background:var(--line)"></div>
        </div>
        <div>${renderFn(item, isLast)}</div>
      </div>
    `;
  });
  html += `</div></div>`;
  return html;
}

function render(unit) {
  const container = document.getElementById('tree-container');
  container.className = '';
  if (!unit) {
    container.innerHTML = '<div class="empty">Pilih Unit Layanan untuk menampilkan struktur organisasi</div>';
    document.getElementById('count-badge').textContent = '';
    return;
  }
  const rows = allData.filter(d => d.unit === unit);
  document.getElementById('count-badge').textContent = `${rows.length} pegawai`;
  container.innerHTML = buildTree(unit);
}

async function loadData() {
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const raw = parseCSV(text);
    allData = raw.map(mapRow).filter(d => d.nama || d.jabatan);

    document.getElementById('subtitle').textContent =
      `${allData.length} pegawai · Data real-time dari Google Sheets`;

    const units = [...new Set(allData.map(d => d.unit).filter(Boolean))].sort();
    const sel = document.getElementById('f-unit');
    sel.innerHTML = '<option value="">— Pilih Unit Layanan —</option>' +
      units.map(u => `<option value="${esc(u)}">${esc(u)}</option>`).join('');

    document.getElementById('tree-container').innerHTML =
      '<div class="empty">Pilih Unit Layanan untuk menampilkan struktur organisasi</div>';

    sel.addEventListener('change', () => render(sel.value));
  } catch (err) {
    document.getElementById('tree-container').innerHTML =
      '<div class="empty">Gagal memuat data. Pastikan Google Sheet sudah dipublish ke web.</div>';
    document.getElementById('subtitle').textContent = 'Gagal memuat data';
    console.error(err);
  }
}

loadData();
</script>
</body>
</html>
