<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Struktur Organisasi Pegawai</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #eeecea;
      --border: rgba(0,0,0,0.08);
      --border-md: rgba(0,0,0,0.13);
      --text: #1a1917;
      --text-sec: #6b6a66;
      --text-hint: #a09e9a;
      --line: #ccc9c2;
      --radius: 10px;
      --radius-sm: 7px;

      /* Level colors */
      --c1-bg: #1D9E75; --c1-txt: #fff;       /* Unit Layanan - hijau */
      --c2-bg: #E6F1FB; --c2-txt: #0C447C;    /* Kantor - biru */
      --c3-bg: #FAEEDA; --c3-txt: #633806;    /* Org Unit - amber */
      --c4-bg: #E1F5EE; --c4-txt: #085041;    /* Atasan - teal */
      --c5-bg: #ffffff; --c5-txt: #1a1917;    /* Pegawai - putih */
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    .page { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    .page-header { margin-bottom: 1.75rem; }
    .page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    .page-sub { font-size: 13px; color: var(--text-sec); margin-top: 3px; }

    /* Controls */
    .controls {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .controls select {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--text);
      background: var(--surface);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      outline: none; cursor: pointer;
      min-width: 200px;
    }
    .controls select:focus { border-color: #1D9E75; }
    .controls select:disabled { opacity: 0.5; cursor: default; }
    .arrow-sep { color: var(--text-hint); font-size: 16px; }
    .count-badge {
      font-size: 12px; color: var(--text-sec);
      background: var(--surface2);
      border-radius: 99px; padding: 4px 12px;
      border: 0.5px solid var(--border);
    }

    /* Legend */
    .legend {
      display: flex; gap: 14px; flex-wrap: wrap;
      margin-bottom: 1.75rem; align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-sec); }
    .legend-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

    /* Tree */
    .tree-wrap { overflow-x: auto; padding-bottom: 1rem; }

    /* Node styles */
    .node {
      display: inline-flex;
      flex-direction: column;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      border: 0.5px solid var(--border-md);
      min-width: 130px;
      max-width: 240px;
      vertical-align: top;
      line-height: 1.4;
    }
    .node-sub {
      font-size: 11px;
      font-weight: 400;
      margin-top: 2px;
      opacity: 0.75;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .node-peg-name { font-weight: 500; font-size: 13px; }
    .node-peg-peg  { font-size: 12px; font-family: 'DM Mono', monospace; opacity: 0.6; margin-left: 6px; }
    .node-peg-jab  { font-size: 11px; font-weight: 400; margin-top: 2px; opacity: 0.65; }

    .node-1 { background: var(--c1-bg); color: var(--c1-txt); border-color: #0F6E56; }
    .node-2 { background: var(--c2-bg); color: var(--c2-txt); border-color: #B5D4F4; }
    .node-3 { background: var(--c3-bg); color: var(--c3-txt); border-color: #FAC775; }
    .node-4 { background: var(--c4-bg); color: var(--c4-txt); border-color: #9FE1CB; }
    .node-5 { background: var(--c5-bg); color: var(--c5-txt); border-color: var(--border-md); }

    /* Tree layout using nested ul/li */
    .tree ul { list-style: none; padding: 0; margin: 0; }

    .tree li {
      display: flex;
      flex-direction: column;
      padding-left: 0;
      position: relative;
    }

    /* Vertical tree structure */
    .tree-node-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      padding: 4px 0;
    }

    /* The vertical+horizontal connector lines */
    .connector-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 32px;
      flex-shrink: 0;
      position: relative;
    }
    .conn-v { width: 1.5px; background: var(--line); flex: 1; min-height: 10px; }
    .conn-h { height: 1.5px; background: var(--line); width: 32px; flex-shrink: 0; }

    /* Children container */
    .children {
      display: flex;
      flex-direction: column;
      padding-left: 32px;
      border-left: 1.5px solid var(--line);
      margin-left: 16px;
    }

    .child-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      padding: 5px 0;
      position: relative;
    }
    .child-row::before {
      content: '';
      position: absolute;
      left: -32px;
      top: 50%;
      width: 32px;
      height: 1.5px;
      background: var(--line);
      transform: translateY(-50%);
    }

    /* Section divider between atasan groups */
    .atasan-group { margin-bottom: 1.25rem; }
    .atasan-group:last-child { margin-bottom: 0; }

    /* Pegawai grid under atasan */
    .pegawai-list {
      display: flex;
      flex-direction: column;
      border-left: 1.5px solid var(--line);
      margin-left: 16px;
      padding-left: 0;
    }
    .pegawai-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 5px 0;
      position: relative;
    }
    .pegawai-item::before {
      content: '';
      position: absolute;
      left: -32px;
      top: 50%;
      width: 32px;
      height: 1.5px;
      background: var(--line);
      transform: translateY(-50%);
    }
    .peg-spacer { width: 32px; flex-shrink: 0; }

    /* Empty/loading */
    .state-msg {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-hint);
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .controls { flex-direction: column; align-items: flex-start; }
      .arrow-sep { display: none; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <div class="page-title">Struktur Organisasi Pegawai</div>
    <div class="page-sub" id="subtitle">Memuat data...</div>
  </div>

  <div class="controls">
    <select id="f-unit"><option value="">— Pilih Unit Layanan —</option></select>
    <span class="arrow-sep">›</span>
    <select id="f-kantor" disabled><option value="">— Pilih Kantor Induk/UP —</option></select>
    <span class="count-badge" id="count-badge" style="display:none"></span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div> Unit Layanan</div>
    <div class="legend-item"><div class="legend-dot" style="background:#B5D4F4"></div> Kantor Induk/UP</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FAC775"></div> Organizational Unit</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9FE1CB"></div> Atasan</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e0ddd8;border:0.5px solid #ccc"></div> Pegawai</div>
  </div>

  <div class="tree-wrap">
    <div id="tree-container" class="state-msg">Pilih Unit Layanan dan Kantor Induk/UP untuk menampilkan struktur organisasi.</div>
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdx_0oA1EIY2PpzNcf1EYbjJ6XhNRGbHff86rr1DFZsJhP_xUrE3XaATeCMHhkvR4lPngfpdiw04cV/pub?output=csv";

let allData = [];

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  });
}

function findCol(row, ...kws) {
  const keys = Object.keys(row);
  for (const kw of kws) {
    const found = keys.find(k => k.toLowerCase().includes(kw.toLowerCase()));
    if (found) return row[found] || '';
  }
  return '';
}

function mapRow(r) {
  // Kolom G = Organizational Unit (index 6, 0-based)
  const vals = Object.values(r);
  const keys = Object.keys(r);
  // Find org unit by column header or position
  let orgUnit = '';
  const ouKey = keys.find(k => k.toLowerCase().includes('organizational') || k.toLowerCase().includes('org unit'));
  if (ouKey) orgUnit = r[ouKey] || '';
  else if (vals[6] !== undefined) orgUnit = vals[6] || '';

  return {
    jabatan: findCol(r, 'position', 'jabatan'),
    nama:    findCol(r, 'full name', 'nama', 'name'),
    nip:     findCol(r, 'prev.per', 'nip', 'pers'),
    peg:     findCol(r, 'peg'),
    unit:    findCol(r, 'unit layanan', 'unit'),
    lokasi:  findCol(r, 'kantor induk', 'kantor', 'lokasi', 'up'),
    atasan:  findCol(r, 'nama atasan', 'atasan', 'supervisor'),
    orgUnit: orgUnit,
  };
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function tr(s, n) {
  s = s||''; return s.length > n ? s.slice(0,n)+'…' : s;
}

function uniqueSorted(arr) {
  return [...new Set(arr.filter(Boolean))].sort();
}

function buildTree(unit, kantor) {
  const rows = allData.filter(d =>
    d.unit === unit && (kantor === '__all__' || d.lokasi === kantor)
  );
  if (!rows.length) return '<div class="state-msg">Tidak ada data untuk pilihan ini.</div>';

  // Group: orgUnit → atasan → pegawai[]
  const orgMap = {};
  rows.forEach(d => {
    const ou  = d.orgUnit || '(Org Unit tidak diketahui)';
    const at  = d.atasan  || '(Atasan tidak diketahui)';
    if (!orgMap[ou]) orgMap[ou] = {};
    if (!orgMap[ou][at]) orgMap[ou][at] = { jabatanAtasan: '', pegawai: [] };
    orgMap[ou][at].pegawai.push(d);
  });

  const unitPegCount = rows.length;
  let html = '<div class="tree" style="display:inline-block;min-width:100%">';

  // Level 1: Unit Layanan
  html += `
    <div style="display:flex;flex-direction:row;align-items:flex-start;padding:4px 0">
      <div class="node node-1" title="${esc(unit)}">
        ${esc(tr(unit,26))}
        <div class="node-sub">${unitPegCount} pegawai</div>
      </div>
    </div>
  `;

  // Level 2: Kantor
  const kantorList = kantor === '__all__'
    ? uniqueSorted(rows.map(d => d.lokasi))
    : [kantor];

  html += `<div class="children">`;
  kantorList.forEach(lok => {
    const lokRows = rows.filter(d => d.lokasi === lok);
    html += `<div class="child-row">`;
    html += `<div style="display:flex;flex-direction:column">`;
    html += `
      <div class="node node-2" title="${esc(lok)}">
        ${esc(tr(lok,24))}
        <div class="node-sub">${lokRows.length} pegawai</div>
      </div>
    `;

    // Level 3: Org Unit
    const ouMap = {};
    lokRows.forEach(d => {
      const ou = d.orgUnit || '(Org Unit tidak diketahui)';
      if (!ouMap[ou]) ouMap[ou] = {};
      const at = d.atasan || '(Atasan tidak diketahui)';
      if (!ouMap[ou][at]) ouMap[ou][at] = [];
      ouMap[ou][at].push(d);
    });

    const ouList = uniqueSorted(Object.keys(ouMap));
    html += `<div class="children">`;
    ouList.forEach(ou => {
      const ouRows = lokRows.filter(d => (d.orgUnit||'(Org Unit tidak diketahui)') === ou);
      html += `<div class="child-row">`;
      html += `<div style="display:flex;flex-direction:column">`;
      html += `
        <div class="node node-3" title="${esc(ou)}">
          ${esc(tr(ou,24))}
          <div class="node-sub">${ouRows.length} pegawai</div>
        </div>
      `;

      // Level 4: Atasan
      const atasanMap = ouMap[ou];
      const atasanList = uniqueSorted(Object.keys(atasanMap));
      html += `<div class="children">`;
      atasanList.forEach(at => {
        const pegList = atasanMap[at];
        // Cari jabatan atasan dari data (nama atasan cocok dengan nama pegawai lain)
        const atasanData = allData.find(d => d.nama === at);
        const jabatanAtasan = atasanData ? atasanData.jabatan : '';

        html += `<div class="child-row atasan-group">`;
        html += `<div style="display:flex;flex-direction:column">`;
        html += `
          <div class="node node-4" title="${esc(at)}">
            ${esc(tr(at,24))}
            ${jabatanAtasan ? `<div class="node-sub">${esc(tr(jabatanAtasan,26))}</div>` : ''}
          </div>
        `;

        // Level 5: Pegawai
        html += `<div class="pegawai-list">`;
        pegList.forEach(peg => {
          html += `
            <div class="pegawai-item">
              <div class="peg-spacer"></div>
              <div class="node node-5" title="${esc(peg.nama)}">
                <div style="display:flex;align-items:baseline;gap:0">
                  <span class="node-peg-name">${esc(tr(peg.nama,22))}</span>
                  ${peg.peg ? `<span class="node-peg-peg">PeG ${esc(peg.peg)}</span>` : ''}
                </div>
                <div class="node-peg-jab">${esc(tr(peg.jabatan,28))}</div>
              </div>
            </div>
          `;
        });
        html += `</div>`; // pegawai-list

        html += `</div></div>`; // atasan col + child-row
      });
      html += `</div>`; // children atasan

      html += `</div></div>`; // ou col + child-row
    });
    html += `</div>`; // children ou

    html += `</div></div>`; // lok col + child-row
  });
  html += `</div>`; // children kantor

  html += `</div>`; // tree
  return html;
}

function render() {
  const unit   = document.getElementById('f-unit').value;
  const kantor = document.getElementById('f-kantor').value;
  const container = document.getElementById('tree-container');
  const badge = document.getElementById('count-badge');

  if (!unit) {
    container.className = 'state-msg';
    container.innerHTML = 'Pilih Unit Layanan dan Kantor Induk/UP untuk menampilkan struktur organisasi.';
    badge.style.display = 'none';
    return;
  }
  if (!kantor) {
    container.className = 'state-msg';
    container.innerHTML = 'Pilih Kantor Induk/UP untuk menampilkan struktur organisasi.';
    badge.style.display = 'none';
    return;
  }

  const rows = allData.filter(d =>
    d.unit === unit && (kantor === '__all__' || d.lokasi === kantor)
  );
  badge.textContent = `${rows.length} pegawai`;
  badge.style.display = 'inline-block';

  container.className = '';
  container.innerHTML = buildTree(unit, kantor);
}

function updateKantorFilter(unit) {
  const sel = document.getElementById('f-kantor');
  if (!unit) {
    sel.innerHTML = '<option value="">— Pilih Kantor Induk/UP —</option>';
    sel.disabled = true;
    return;
  }
  const kantors = uniqueSorted(allData.filter(d => d.unit === unit).map(d => d.lokasi));
  sel.innerHTML = '<option value="">— Pilih Kantor Induk/UP —</option>' +
    (kantors.length > 1 ? `<option value="__all__">Semua Kantor (${kantors.length})</option>` : '') +
    kantors.map(k => `<option value="${esc(k)}">${esc(k)}</option>`).join('');
  sel.disabled = false;
}

async function loadData() {
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const raw  = parseCSV(text);
    allData    = raw.map(mapRow).filter(d => d.nama || d.jabatan);

    document.getElementById('subtitle').textContent =
      `${allData.length} pegawai · Data real-time dari Google Sheets`;

    const units = uniqueSorted(allData.map(d => d.unit));
    const selU  = document.getElementById('f-unit');
    selU.innerHTML = '<option value="">— Pilih Unit Layanan —</option>' +
      units.map(u => `<option value="${esc(u)}">${esc(u)}</option>`).join('');

    selU.addEventListener('change', () => {
      updateKantorFilter(selU.value);
      document.getElementById('f-kantor').value = '';
      render();
    });
    document.getElementById('f-kantor').addEventListener('change', render);

  } catch (err) {
    document.getElementById('tree-container').innerHTML =
      '<div class="state-msg">Gagal memuat data. Pastikan Google Sheet sudah dipublish ke web.</div>';
    document.getElementById('subtitle').textContent = 'Gagal memuat data';
    console.error(err);
  }
}

loadData();
</script>
</body>
</html>
